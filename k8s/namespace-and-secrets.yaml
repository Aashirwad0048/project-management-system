apiVersion: v1
kind: Namespace
metadata:
  name: team-pm
---
# Create this secret before deploying:
# kubectl create secret generic team-pm-secrets \
#   --from-literal=MONGO_URI="mongodb+srv://..." \
#   --from-literal=JWT_SECRET="your_jwt_secret" \
#   -n team-pm
apiVersion: v1
kind: Secret
metadata:
  name: team-pm-secrets
  namespace: team-pm
type: Opaque
stringData:
  MONGO_URI: "REPLACE_WITH_YOUR_MONGO_ATLAS_URI"
  JWT_SECRET: "REPLACE_WITH_YOUR_JWT_SECRET"
